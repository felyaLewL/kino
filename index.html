<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Жесткий запрет на кэширование для Телеграма -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        /* Делаем так, чтобы плеер занял 100% экрана, иначе будет черный квадрат */
        .kinobox_player { width: 100%; height: 100%; } 
    </style>
</head>
<body>
    <!-- Контейнер для плеера -->
    <div class="kinobox_player"></div>
    
    <!-- Подключаем открытый скрипт Kinobox -->
    <script src="https://kinobox.tv/kinobox.min.js"></script>
    <script>
        // Разворачиваем окно Телеграма на максимум
        window.Telegram.WebApp.expand();

        // Достаем ID фильма из ссылки (ту самую, что передал бот)
        const urlParams = new URLSearchParams(window.location.search);
        const kpId = urlParams.get('kp_id');
        
        // Если ID есть, запускаем плеер. Иначе выводим красную ошибку.
        if(kpId) {
            kbox('.kinobox_player', {search: {kinopoisk: kpId}});
        } else {
            document.body.innerHTML = "<h3 style='color:red; text-align:center; font-family:sans-serif; margin-top:50px;'>Ошибка: ID фильма не передан</h3>";
        }
    </script>
</body>
</html>
