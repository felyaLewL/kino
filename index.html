<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        /* Плеер растягиваем на весь экран */
        #yohoho { width: 100%; height: 100%; } 
    </style>
</head>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const kpId = urlParams.get('kp_id');
        
        if (kpId) {
            // Команда document.write вписывает HTML жестко и ДО окончания загрузки страницы
            document.write('<div id="yohoho" data-kinopoisk="' + kpId + '"></div>');
            document.write('<script src="//yohoho.cc/yo.js"><\/script>');
        } else {
            document.write('<h3 style="color:red; text-align:center; margin-top:50px;">Ошибка: ID фильма не передан</h3>');
        }
    </script>
</body>
</html>
