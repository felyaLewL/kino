<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        /* Растягиваем плеер на весь экран */
        #yohoho { width: 100%; height: 100%; } 
    </style>
</head>
<body>
    <!-- 1. Создаем пустой контейнер для плеера -->
    <div id="yohoho"></div>
    
    <!-- 2. Скрипт, который мгновенно закидывает ID фильма в контейнер -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const kpId = urlParams.get('kp_id');
        
        if (kpId) {
            document.getElementById('yohoho').dataset.kinopoisk = kpId;
        } else {
            document.getElementById('yohoho').innerHTML = '<h3 style="color:red; text-align:center; margin-top:50px;">Ошибка: ID фильма не передан</h3>';
        }
    </script>
    
    <!-- 3. Обычная, железобетонная загрузка самого плеера -->
    <script src="https://yohoho.cc/yo.js"></script>
</body>
</html>
