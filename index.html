<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        /* Делаем так, чтобы плеер занял 100% экрана */
        #yohoho { width: 100%; height: 100%; } 
    </style>
</head>
<body>
    <h2 style="color:white; text-align:center; margin-top: 50px;">РАБОТАЕТ!</h2>
    <!-- Контейнер для нового плеера -->
    <!-- Контейнер для нового плеера -->
    <div id="yohoho"></div>
    
    <script>
        // Разворачиваем окно на максимум
        window.Telegram.WebApp.expand();

        // Достаем ID фильма из ссылки
        const urlParams = new URLSearchParams(window.location.search);
        const kpId = urlParams.get('kp_id');
        
        if(kpId) {
            // Передаем ID фильма в контейнер
            document.getElementById('yohoho').dataset.kinopoisk = kpId;
            
            // Подгружаем скрипт бессмертного плеера Yohoho
            const script = document.createElement('script');
            script.src = 'https://yohoho.cc/yo.js';
            document.body.appendChild(script);
        } else {
            document.body.innerHTML = "<h3 style='color:red; text-align:center; font-family:sans-serif; margin-top:50px;'>Ошибка: ID фильма не передан</h3>";
        }
    </script>
</body>
</html>
