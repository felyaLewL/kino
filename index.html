<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        /* Делаем окно плеера на весь экран, убираем рамки */
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const kpId = urlParams.get('kp_id');
        
        if (kpId) {
            // Вставляем другой плеер (Voidboost) напрямую как страницу в странице
            document.write('<iframe src="https://voidboost.net/embed/' + kpId + '" allowfullscreen allow="autoplay; fullscreen"></iframe>');
        } else {
            document.write('<h3 style="color:red; text-align:center; margin-top:50px;">Ошибка: ID фильма не передан</h3>');
        }
    </script>
</body>
</html>
